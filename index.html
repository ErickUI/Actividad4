<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Formulario de Login</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        margin: 0;
      }

      header {
        background: rgba(0, 0, 0, 0.1);
        padding: 20px;
        text-align: center;
        color: white;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      }

      header h1 {
        margin: 0;
        font-size: 24px;
      }

      main {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .form-container {
        background: #ffffff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        width: 300px;
      }

      .form-container h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
      }

      .input-group {
        margin-bottom: 15px;
      }

      .input-group label {
        display: block;
        margin-bottom: 5px;
        color: #555;
        font-size: 14px;
      }

      .input-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 8px;
        outline: none;
        transition: 0.3s;
      }

      .input-group input:focus {
        border-color: #4facfe;
        box-shadow: 0 0 5px rgba(79, 172, 254, 0.5);
      }

      .btn-submit {
        width: 100%;
        padding: 10px;
        background: #4facfe;
        border: none;
        border-radius: 8px;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
      }

      .btn-submit:hover {
        background: #3a8fd9;
      }

      footer {
        background: rgba(0, 0, 0, 0.1);
        padding: 15px;
        text-align: center;
        color: white;
        box-shadow: 0 -2px 5px rgba(0, 0, 0, 0.2);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Sistema de Autenticación</h1>
    </header>

    <main>
      <div class="form-container">
        <h2>Iniciar Sesión</h2>
        <form>
          <div class="input-group">
            <label for="usuario">Usuario</label>
            <input type="text" id="usuario" placeholder="Ingresa tu usuario" />
          </div>

          <div class="input-group">
            <label for="contrasena">Contraseña</label>
            <input
              type="password"
              id="contrasena"
              placeholder="Ingresa tu contraseña"
            />
          </div>

          <button type="submit" class="btn-submit">Enviar</button>
        </form>
      </div>
    </main>

    <footer>
      <p>&copy; 2024 Todos los derechos reservados.</p>
    </footer>
  </body>
</html>
